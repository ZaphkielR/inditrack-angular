@if (toast$ | async; as toast) {
  @if (toast.visible) {
    <div
      [attr.id]="
        toast.variant === 'success'
          ? 'toast-success'
          : toast.variant === 'warning'
            ? 'toast-warning'
            : 'toast-danger'
      "
      class="fixed top-5 right-5 flex items-center w-full max-w-sm p-4 text-body bg-neutral-primary-soft rounded-base shadow border border-default"
      role="alert"
    >
      <div
        class="inline-flex items-center justify-center shrink-0 w-7 h-7 rounded"
        [ngClass]="{
          'text-fg-success bg-success-soft': toast.variant === 'success',
          'text-fg-warning bg-warning-soft': toast.variant === 'warning',
          'text-fg-danger bg-danger-soft': toast.variant === 'error',
        }"
      >
        <!-- SUCCESS ICON -->
        @if (toast.variant === 'success') {
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 11.917 9.724 16.5 19 7.5"
            />
          </svg>
          <span class="sr-only">Success icon</span>
        }

        <!-- ERROR ICON -->
        @if (toast.variant === 'error') {
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18 17.94 6M18 18 6.06 6"
            />
          </svg>
          <span class="sr-only">Error icon</span>
        }

        <!-- WARNING ICON -->
        @if (toast.variant === 'warning') {
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 13V8m0 8h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
          </svg>
          <span class="sr-only">Warning icon</span>
        }
      </div>

      <div class="ms-3 text-sm font-normal">
        {{ toast.message }}
      </div>

      <button
        type="button"
        class="ms-auto flex items-center justify-center text-body hover:text-heading bg-transparent border border-transparent hover:bg-neutral-secondary-medium rounded text-sm h-8 w-8"
        aria-label="Close"
        (click)="close()"
      >
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18 17.94 6M18 18 6.06 6"
          />
        </svg>
      </button>
    </div>
  }
}
