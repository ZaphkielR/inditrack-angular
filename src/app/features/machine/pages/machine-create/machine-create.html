<div class="flex h-full items-center justify-center">
    <div class="w-full max-w-4xl bg-white p-6 rounded-lg shadow-lg">
        <form nz-form [formGroup]="form" class="h-full flex flex-col">
            <!-- Contenedor de campos -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto pr-2">
                <!-- NAME -->
                <nz-form-item>
                    <nz-form-label nzFor="name" nzRequired>Nombre</nz-form-label>
                    <nz-form-control nzErrorTip="Requerido">
                        <input nz-input id="name" formControlName="name" />
                    </nz-form-control>
                </nz-form-item>

                <!-- MODEL -->
                <nz-form-item>
                    <nz-form-label nzFor="model" nzRequired>Modelo</nz-form-label>
                    <nz-form-control nzErrorTip="Requerido">
                        <input nz-input id="model" formControlName="model" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item>
                    <nz-form-label nzFor="location" nzRequired>Ubicación</nz-form-label>
                    <nz-form-control nzErrorTip="Requerido">
                        <input nz-input id="location" formControlName="location" />
                    </nz-form-control>
                </nz-form-item>

                <!-- INSTALLED AT -->
                <nz-form-item>
                    <nz-form-label nzFor="installed_at" nzRequired>Fecha instalación</nz-form-label>
                    <nz-form-control>
                        <nz-date-picker
                            id="installed_at"
                            formControlName="installed_at"
                            [nzShowTime]="{ nzFormat: 'HH:mm', nzHideDisabledOptions: true }"
                            nzFormat="yyyy-MM-dd HH:mm"
                            nzPlaceHolder="Selecciona fecha y hora"
                            class="w-full"
                        />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <!-- Botones -->
            <div class="mt-4 flex justify-end gap-2">
                <button
                    nz-button
                    nzType="primary"
                    type="button"
                    (click)="goToMachineList()"
                    nzDanger
                >
                    Cancelar
                </button>

                <button nz-button type="button" (click)="reset()" nzDanger>Limpiar</button>
                <button
                    nz-button
                    nzType="primary"
                    type="submit"
                    [disabled]="form.invalid"
                    (click)="submit()"
                >
                    Guardar
                </button>
            </div>
        </form>
    </div>
</div>
