<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-gray-900">Machines</h1>

    <button
      class="text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-5 py-2.5"
    >
      New Machine
    </button>
  </div>

  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table class="w-full text-sm text-left text-gray-500">
      <thead class="text-xs text-gray-700 uppercase bg-gray-100">
        <tr>
          <th class="px-6 py-3">ID</th>
          <th class="px-6 py-3">Name</th>
          <th class="px-6 py-3">Code</th>
          <th class="px-6 py-3">Status</th>
          <th class="px-6 py-3">Actions</th>
        </tr>
      </thead>

      <tbody>
        @for (machine of machines(); track machine.id) {
          <tr class="bg-white border-b hover:bg-gray-50">
            <td class="px-6 py-4">
              {{ machine.id }}
            </td>

            <td class="px-6 py-4 font-medium text-gray-900">
              {{ machine.name }}
            </td>

            <td class="px-6 py-4">
              <span
                class="px-2 py-1 text-xs rounded"
                [ngClass]="{
                  'bg-green-100 text-green-800': machine.status === 'active',
                  'bg-yellow-100 text-yellow-800': machine.status === 'maintenance',
                  'bg-red-100 text-red-800': machine.status === 'offline',
                }"
              >
                {{ machine.status }}
              </span>
            </td>

            <td class="px-6 py-4 flex gap-2">
              <button class="text-blue-600 hover:underline">Edit</button>

              <button class="text-red-600 hover:underline">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
